<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="Welcome to CyScripts, your go-to source for Roblox scripts!"><meta name="keywords" content="CyScripts, Roblox, scripts, gaming scripts, Roblox Town"><meta name="robots" content="index, follow"><meta name="author" content="CyScripts Inc"><meta name="theme-color" content="#F9A31A"><link rel="icon" href="https://anoxle.github.io/cyscripts/icon.png" type="image/x-icon"><title>CyScripts - Home</title><style>body{margin:0;padding:0;height:100vh;overflow:hidden;background-color:#131422;animation:backgroundColorChange 10s infinite linear;display:flex;flex-direction:column;justify-content:flex-start;align-items:center}@keyframes backgroundColorChange{0%{background-color:#131422}50%{background-color:#1c1d2f}100%{background-color:#131422}}.text{color:#fff;font-size:36px;margin-top:100px;position:relative;opacity:0;animation:fadeInText .5s ease-out forwards;animation-delay:.5s}@keyframes fadeInText{to{opacity:1}}.underline{content:'';position:absolute;left:0;bottom:-3px;width:100%;height:2px;background-color:#fff;border-radius:1px}.explore{color:#fff;font-size:24px;margin-top:10px;opacity:0;animation:fadeInText .5s ease-out forwards;animation-delay:1s}.search-bar{margin-top:10px;width:80%;max-width:600px;display:flex;justify-content:center;opacity:0;animation:fadeInText .5s ease-out forwards;animation-delay:1.5s}.search-input{width:100%;padding:10px;border-radius:15px;border:none;background-color:#1c1d2f;color:#fff;font-size:16px}.box{background-color:#1c1d2f;border-radius:15px;padding:15px;margin-top:20px;width:70%;max-width:500px;box-shadow:0 4px 10px rgba(0,0,0,.5);opacity:0;animation:fadeInBox .5s ease-out forwards;animation-delay:2s;display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .3s}@keyframes fadeInBox{to{opacity:1}}.box:hover{transform:scale(1.05)}.banner{width:100%;border-radius:10px}.name{color:#fff;font-size:20px;margin-top:10px}.description{color:#ccc;font-size:16px;text-align:center;margin-top:5px}</style></head><body><div class="text">Welcome to CyScripts<div class="underline"></div></div><div class="explore">Explore Our Scripts</div><div class="search-bar"><input type="text" class="search-input" placeholder="Search for scripts..." oninput="filterScripts()"></div><div id="scriptBox" class="box" style="display:flex" onclick='window.open("https://cyscripts.github.io/game/town/hixmenuhixmenu","_blank")'><img class="banner" src="https://tr.rbxcdn.com/8d364367b3720479c6ae71a87ff4c332/768/432/Image/Webp" alt="HiX Menu Banner"><div class="name">HiX Menu</div><div class="description">A Menu for Roblox Town</div></div><script>function filterScripts() {

}</script></body></html>
