<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Bighity For Combat Warriors">
  <meta name="keywords" content="CyScripts, Roblox, Combat Warriors, Bighity, gaming scripts, Roblox scripts, game menu">
  <meta name="author" content="CyScripts Admin 8">
  <title>CyScripts - Bighity For Combat Warriors</title>
  <link rel="icon" type="image/png" href="https://anoxle.github.io/cyscripts/icon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="canonical" href="https://anoxle.github.io/cyscripts/combat-warriors">
  <meta property="og:title" content="CyScripts - Bighity For Combat Warriors">
  <meta property="og:description" content="Bighity For Combat Warriors">
  <meta property="og:url" content="https://anoxle.github.io/cyscripts/combat-warriors">
  <meta name="twitter:title" content="CyScripts - Bighity For Combat Warriors">
  <meta name="twitter:description" content="Bighity For Combat Warriors">
  <meta name="theme-color" content="#F9A31A">
</head>
<body>
  <div class="content">
    <h1>
      <a href="https://www.roblox.com/games/4282985734/" target="_blank" class="roblox-town">Bighity For <span>Combat Warriors</span>
      </a>
    </h1>
    <p class="by">Made by CyScripts Admin 8</p>
    <img src="https://tr.rbxcdn.com/180DAY-1d78ccea0e68685a2523daf413435647/768/432/Image/Webp/noFilter" alt="Game Thumbnail 1" class="thumbnail">
    <div class="textbar-container">
      <input type="text" class="textbar" value="loadstring(game:HttpGet(&quot;https://raw.githubusercontent.com/cyscripts/cyscripts.github.io/scripts/combat-warriors/bighity&quot;))()" readonly="readonly" onclick="this.select()">
      <button class="copy-button" title="Copy to Clipboard" onclick="copyToClipboard(this.previousElementSibling.value)">
        <i class="fas fa-clipboard"></i>
      </button>
    </div>
    <div class="notification">Copied To Clipboard!</div>
    <p class="loading-message">Might take a while to load depending on your executor!</p>
    <script>
      function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
          const notification = document.querySelector('.notification');
          notification.style.display = 'block';
          setTimeout(() => {
            notification.style.display = 'none';
          }, 3000);
        });
      }
    </script>
  </div>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      animation: backgroundColorChange 10s infinite linear;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: #fff;
      overflow: hidden
    }

    @keyframes backgroundColorChange {
      0% {
        background-color: #131422
      }

      50% {
        background-color: #1c1d2f
      }

      100% {
        background-color: #131422
      }
    }

    .content {
      text-align: center;
      max-width: 90%
    }

    .by,
    .textbar-container,
    .thumbnail,
    h1 {
      opacity: 0;
      transform: translateY(20px)
    }

    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      animation: fadeInSlideUp .8s ease-out .2s forwards
    }

    .roblox-town {
      text-decoration: none;
      color: #fff;
      border-bottom: 2px solid #fff;
      padding-bottom: 2px;
      transition: border-color .3s ease
    }

    .roblox-town:hover {
      border-color: #4caf50
    }

    .by {
      color: #a0a0a0;
      font-size: 1.2em;
      margin-top: 0;
      animation: fadeInSlideUp .8s ease-out .6s forwards
    }

    .by {
      color: #a0a0a0;
      font-size: 1.2em;
      margin-top: 0;
      animation: fadeInSlideUp .8s ease-out .6s forwards
    }

    .thumbnail {
      width: 100%;
      height: 200px;
      margin: 20px 0;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      animation: fadeInSlideUp .8s ease-out .8s forwards
    }

    .textbar-container {
      position: relative;
      margin: 20px 0;
      animation: fadeInSlideUp .8s ease-out 1s forwards
    }

    .textbar {
      width: 100%;
      padding: 10px;
      font-size: 1.2em;
      border: none;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2)
    }

    .textbar:focus {
      outline: none;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5)
    }

    .copy-button {
      position: absolute;
      top: 50%;
      right: 10px;
      transform: translateY(-50%);
      background-color: #4caf50;
      color: #fff;
      border: none;
      padding: 10px 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color .3s ease
    }

    .copy-button:hover {
      background-color: #3e8e41
    }

    .notification {
      position: fixed;
      top: 10px;
      right: 10px;
      background-color: #4caf50;
      color: #fff;
      padding: 10px 15px;
      border-radius: 10px;
      display: none;
      animation: fadeIn .5s ease-out
    }

    .loading-message {
      font-size: 1.2em;
      color: #a0a0a0;
      margin-bottom: 20px;
      animation: fadeInSlideUp .8s ease-out 1.2s forwards
    }

    @keyframes fadeIn {
      0% {
        opacity: 0
      }

      100% {
        opacity: 1
      }
    }

    @keyframes fadeInSlideUp {
      0% {
        opacity: 0;
        transform: translateY(20px)
      }

      100% {
        opacity: 1;
        transform: translateY(0)
      }
    }
  </style>
</body>
</html>
